<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Team | KMC Samulnori</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-admin-page="team">
<div class="admin-shell">
    <header class="admin-topbar admin-site-header">
        <a class="admin-brand" href="../index.html" aria-label="KMC Samulnori home">
            <img src="../assets/logo/full.png" alt="KMC Samulnori">
        </a>
        <nav class="admin-nav" aria-label="Admin navigation">
            <a href="dashboard.html" data-admin-page="dashboard">Dashboard</a><a href="home.html" data-admin-page="home-sections">Home Page</a>
            <a href="performances.html" data-admin-page="performances">Performances</a>
                <a href="arrangements.html" data-admin-page="arrangements">Arrangements</a>
            <a href="team.html" data-admin-page="team">Team</a>
        </nav>
    </header>

    <div id="team-loading" class="dashboard-loading">Verifying administrator access…</div>

    <main id="team-admin" class="admin-dashboard-main" hidden>
        <div class="admin-dashboard-header">
            <div><h1>Team</h1></div>
            <div class="admin-user-meta">
                <span id="admin-user-email"></span>
                <button id="admin-logout" class="admin-logout" type="button">Sign Out</button>
            </div>
        </div>

        <form id="team-form" class="team-admin-form">
            <section class="admin-panel team-editor-panel">
                <div class="admin-panel-heading">
                    <div>
                        <h2>Instructor</h2>
                    </div>
                </div>

                <div class="team-editor-grid">
                    <div class="admin-field">
                        <label for="instructor-name">Teacher’s name</label>
                        <input id="instructor-name" name="instructorName" type="text" required>
                    </div>
                    <div class="admin-field">
                        <label for="instructor-korean-name">Korean name</label>
                        <input id="instructor-korean-name" name="instructorKoreanName" type="text">
                    </div>
                </div>

                <div class="admin-field">
                    <label for="teacher-message-ko">Teacher’s message (Korean)</label>
                    <div id="teacher-message-ko" data-rich-editor aria-label="Teacher’s message in Korean"></div>
                    <p class="admin-help-text">Separate paragraphs with a blank line.</p>
                </div>

                <div class="admin-field">
                    <label for="teacher-message-en">Teacher’s message (English)</label>
                    <div id="teacher-message-en" data-rich-editor aria-label="Teacher’s message in English"></div>
                    <p class="admin-help-text">Separate paragraphs with a blank line.</p>
                </div>
            </section>

            <section class="admin-panel team-editor-panel">
                <div class="admin-panel-heading team-members-heading">
                    <div>
                        <h2>Members</h2>
                    </div>
                    <button id="add-member" class="admin-secondary-button" type="button">Add Member</button>
                </div>

                <div id="member-editor-list" class="member-editor-list"></div>
            </section>

            <div class="team-save-bar">
                <p id="team-status" class="login-status" role="status" aria-live="polite"></p>
                <button id="save-team" class="admin-submit" type="submit">Save Team Page</button>
            </div>
        </form>
    </main>

    <footer class="admin-public-footer">
        <div class="admin-footer-container">
            <div class="admin-footer-logo"><img src="../assets/logo/full.png" alt="KMC Samulnori Logo"></div>
            <div class="admin-footer-contact"><p>Contact: <a href="mailto:kmc-samulnori@gmail.com">kmc-samulnori@gmail.com</a></p></div>
            <div class="admin-footer-bottom"><p>© 2026 KMC Samulnori. All Rights Reserved.</p></div>
        </div>
    </footer>
</div>

<template id="member-editor-template">
    <article class="member-editor-card">
        <div class="member-drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag member to reorder">⋮⋮</div>
        <div class="member-editor-card-header">
            <h3>Member <span class="member-number"></span></h3>
            <button class="admin-danger-button admin-small-button remove-member" type="button">Remove</button>
        </div>
        <div class="team-editor-grid team-member-fields">
            <div class="admin-field">
                <label>Name</label>
                <input class="member-name" type="text" required>
            </div>
            <div class="admin-field">
                <label>Age</label>
                <input class="member-age" type="number" min="1" max="120" inputmode="numeric" required>
            </div>
            <div class="admin-field">
                <label>Years of service</label>
                <input class="member-service" type="text" placeholder="Example: ~2 years">
            </div>
        </div>
    </article>
</template>

<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/admin-tools.js"></script><script src="../js/admin-team.js"></script>
<script src="../js/admin-motion.js"></script>
</body>
</html>
