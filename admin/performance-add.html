<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Add Performance | KMC Samulnori
</title>


<style>

body{

font-family:Arial, sans-serif;

background:#111;

color:white;

padding:40px;

}


.container{

max-width:600px;

margin:auto;

background:#1c1c1c;

padding:40px;

border-radius:20px;

}


h1{

text-align:center;

margin-bottom:30px;

}


label{

display:block;

margin-top:20px;

margin-bottom:8px;

}


input,
select,
textarea{

width:100%;

padding:12px;

border-radius:10px;

border:none;

background:#333;

color:white;

font-size:16px;

}


textarea{

height:120px;

resize:none;

}


button{

margin-top:30px;

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:#ff4444;

color:white;

font-size:18px;

cursor:pointer;

}


button:hover{

opacity:.8;

}


#message{

text-align:center;

margin-top:20px;

}



</style>

</head>




<body>



<div class="container">


<h1>
Add Performance
</h1>





<input

type="hidden"

id="performanceID">







<label>
Date
</label>


<input

id="date"

placeholder="Example: March 15, 2026">









<label>
Location
</label>


<input

id="location"

placeholder="Example: Azusa High School">









<label>
Arrangement
</label>


<select id="arrangement">


<option>
Samulnori 사물놀이
</option>


<option>
Nongak 농악
</option>


<option>
Ogomu 오고무
</option>


<option>
Nanta 난타
</option>


<option>
Sogo 소고춤
</option>


</select>









<label>
Highlight Photo
</label>


<input

id="highlightFile"

type="file"

accept="image/*">









<label>
Performance Photos
</label>


<input

id="photoFiles"

type="file"

multiple

accept="image/*">









<label>
Performance Videos
</label>


<input

id="videoFiles"

type="file"

multiple

accept="video/*">







<button id="submitPerformance">

Save Performance

</button>






<p id="message"></p>



</div>









<script

type="module"

src="../js/performance-add.js">

</script>



</body>

</html>
