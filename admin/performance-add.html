<!DOCTYPE html>
<html>
<head>

<title>Add Performance | KMC Admin</title>

<link rel="stylesheet" href="../css/admin.css">

</head>


<body>


<h1>Add Performance</h1>


<form id="performanceForm">


<label>
Date
</label>

<input 
id="date"
type="text"
placeholder="March 15, 2026"
required
>


<label>
Location
</label>

<input 
id="location"
type="text"
placeholder="Korean Cultural Festival"
required
>


<label>
Arrangement
</label>

<select id="arrangement">

<option>
Samulnori 사물놀이
</option>

<option>
Nongak 농악
</option>

<option>
Ogomu 오고무
</option>

<option>
Nanta 난타
</option>

<option>
Sogo 소고춤
</option>

</select>


<label>
Highlight Image URL
</label>

<input
id="highlight"
type="text"
placeholder="Image URL"
>


<button type="submit">
Publish Performance
</button>


</form>


<script 
type="module"
src="../js/performance-add.js">
</script>


</body>
</html>
