<body>



<h1>
Add New Performance
</h1>




<label>

</label>

<br>

<input

id="date"

type="text"

placeholder="Example: March 15, 2026">

<label>

</label>

<br>

<input

id="location"

type="text"

placeholder="Example: Azusa High School">


<br><br>





<label>

</label>

<br>

<select id="arrangement">


<option>
Samulnori 사물놀이
</option>


<option>
Nongak 농악
</option>


<option>
Ogomu 오고무
</option>


<option>

</option>


<option>

</option>


</select>



<br><br>







<label>
Highlight Image URL
</label>


<br>


<input

id="highlight"

type="text"

placeholder="Image URL">


<br><br>







<label>
Photos (comma separated URLs)
</label>


<br>


<textarea

id="photos"

placeholder="photo1.jpg, photo2.jpg">

</textarea>



<br><br>







<label>
Videos (comma separated URLs)
</label>


<br>


<textarea

id="videos"

placeholder="video1.mp4, video2.mp4">

</textarea>



<br><br>






<button id="submitPerformance">

Submit Performance

</button>




<p id="message">

</p>








<script

type="module"

src="../js/performance-add.js">

</script>

<!-- Highlight -->

<label>
Highlight Photo
</label>

<input

>



<!-- Photos -->

<label>
Performance Photos
</label>

<input
id="photoFiles"

multiple

<!-- Videos -->

<h2>
Videos
</h2>


<label>
Video Title
</label>

<input
id="videoTitle"
type="text"

>



<label>
Video Thumbnail
</label>

<input
id="videoThumbnail"
type="text"
placeholder="YouTube thumbnail URL"
>



<label>
Video URL
</label>

<input
id="videoURL"
type="text"
placeholder="https://youtube.com/..."
>

placeholder="3:42"
>
