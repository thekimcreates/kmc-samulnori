<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Performance | KMC Admin</title>

<link rel="stylesheet" href="../css/admin.css">

</head>


<body>


<div class="admin-container">


<h1>
Add New Performance
</h1>


<form id="performanceForm">


<!-- Date -->

<label>
Performance Date
</label>

<input
id="date"
type="text"
placeholder="March 15, 2026"
required
>



<!-- Location -->

<label>
Location
</label>

<input
id="location"
type="text"
placeholder="Korean Cultural Festival"
required
>



<!-- Arrangement -->

<label>
Arrangement
</label>

<select id="arrangement">


<option>
Samulnori 사물놀이
</option>


<option>
Nongak 농악
</option>


<option>
Ogomu 오고무
</option>


<option>
Nanta 난타
</option>


<option>
Sogo 소고춤
</option>


</select>



<!-- Highlight -->

<label>
Highlight Photo
</label>

<input
id="highlightFile"
type="file"
accept="image/*"
required
>



<!-- Photos -->

<label>
Performance Photos
</label>

<input
id="photoFiles"
type="file"
accept="image/*"
multiple
>



<!-- Videos -->

<h2>
Videos
</h2>


<label>
Video Title
</label>

<input
id="videoTitle"
type="text"
placeholder="Spring Festival Performance"
>



<label>
Video Thumbnail
</label>

<input
id="videoThumbnail"
type="text"
placeholder="YouTube thumbnail URL"
>



<label>
Video URL
</label>

<input
id="videoURL"
type="text"
placeholder="https://youtube.com/..."
>



<label>
Video Length
</label>

<input
id="videoLength"
type="text"
placeholder="3:42"
>




<button
type="submit">

Publish Performance

</button>



</form>


</div>



<script
type="module"
src="../js/performance-add.js">
</script>


</body>

</html>
